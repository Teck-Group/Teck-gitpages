<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login</title>
    <link rel="stylesheet" href="/Teck-gitpages/css/style.css"/> 
    <link rel="icon" type="image/png" href="/Teck-gitpages/images/teck-logo.png"/>
</head>
<body>
    <!-- Admin Login Form, logica kan niet worden toegevoegd omdat github pages geen server-side scripting (backend) ondersteunt -->
    <h1>Admin Login</h1>
    <form action="dashboard.html" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
</body>
</html>
